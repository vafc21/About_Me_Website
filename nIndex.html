<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vlad Petrosyan</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png">
        <link rel="stylesheet" href="nStyles.css">
    </head>
    <body>
        
        <main>
            <section>
            <div class="head">
                <div class="title">Vlad Petrosyan</div>

                <div class="controls">
                <button id="prev" class="nav-btn" aria-label="Prev">‹</button>
                <button id="next" class="nav-btn" aria-label="Next">›</button>
                </div>
                
            </div>
            <div class="slider">
                <div class="track" id="track">

                <article class="project-card" active onclick="window.location.href='about.html'" style="cursor:pointer;">
                    <img class="project-card__bg" src="/profile-placeholder.jpg" alt="About Me Photo">
                    <div class="project-card__content">
                    <div class="frosted-box">
                        <div>
                        <h3 class="project-card__title">About Me</h3>
                        <p class="project-card__desc">Welcome, I’m Vlad, a student, engineer, and robotics developer.
                        </p>
                        </div>
                    </div>
                </article>

                <article class="project-card" active onclick="window.location.href='skills.html'" style="cursor:pointer;">
                    <img class="project-card__bg" src="/images/V_logo_with_code_I_made.png" alt="Skills Photo">
                    <div class="project-card__content">
                    <div class="frosted-box">
                        <div>
                        <div>
                            <h3 class="project-card__title">Skills</h3>
                            <p class="project-card__desc">My skills that I have built up upon.</p>
                            </div>
                </article>

                <article class="project-card" active onclick="window.location.href='projects.html'" style="cursor:pointer;">
                    <img class="project-card__bg" src="/images/github-icon-filled.png" alt="Projects Photo">
                    <div class="project-card__content">
                    <div class="frosted-box">
                        <div>
                        <h3 class="project-card__title">Projects</h3>
                        <p class="project-card__desc">My projects that I have done over the years. </p>
                        </p>
                        </div>
                </article>

                </div>
            </div>

            <div class="dots" id="dots"></div>
            </section>
            </main>
        <footer>
            <p>&copy; 2025 Vlad Petrosyan. All rights reserved.</p>
        </footer>

        <script>(() => {
        const track = document.getElementById("track");
        const wrap = track.parentElement;
        const cards = Array.from(track.children);
        const prev = document.getElementById("prev");
        const next = document.getElementById("next");
        const dotsBox = document.getElementById("dots");

        const isMobile = () => matchMedia("(max-width:767px)").matches;

        cards.forEach((_, i) => {
            const dot = document.createElement("span");
            dot.className = "dot";
            dot.onclick = () => activate(i, true);
            dotsBox.appendChild(dot);
        });
        const dots = Array.from(dotsBox.children);

        let current = 0;

        function center(i) {
            const card = cards[i];
            const axis = isMobile() ? "top" : "left";
            const size = isMobile() ? "clientHeight" : "clientWidth";
            const start = isMobile() ? card.offsetTop : card.offsetLeft;
            wrap.scrollTo({
            [axis]: start - (wrap[size] / 2 - card[size] / 2),
            behavior: "smooth"
            });
        }

        function toggleUI(i) {
            cards.forEach((c, k) => c.toggleAttribute("active", k === i));
            dots.forEach((d, k) => d.classList.toggle("active", k === i));
            prev.disabled = i === 0;
            next.disabled = i === cards.length - 1;
        }

        function activate(i, scroll) {
            if (i === current) return;
            current = i;
            toggleUI(i);
            if (scroll) center(i);
        }

        function go(step) {
            activate(Math.min(Math.max(current + step, 0), cards.length - 1), true);
        }

        prev.onclick = () => go(-1);
        next.onclick = () => go(1);

        addEventListener(
            "keydown",
            (e) => {
            if (["ArrowRight", "ArrowDown"].includes(e.key)) go(1);
            if (["ArrowLeft", "ArrowUp"].includes(e.key)) go(-1);
            },
            { passive: true }
        );

        cards.forEach((card, i) => {
            card.addEventListener(
            "mouseenter",
            () => matchMedia("(hover:hover)").matches && activate(i, true)
            );
            card.addEventListener("click", (e) => {
                // Only activate if no navigation is set
                if (!card.onclick) activate(i, true);
            });
        });

        let sx = 0,
            sy = 0;
        track.addEventListener(
            "touchstart",
            (e) => {
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
            },
            { passive: true }
        );

        track.addEventListener(
            "touchend",
            (e) => {
            const dx = e.changedTouches[0].clientX - sx;
            const dy = e.changedTouches[0].clientY - sy;
            if (isMobile() ? Math.abs(dy) > 60 : Math.abs(dx) > 60)
                go((isMobile() ? dy : dx) > 0 ? -1 : 1);
            },
            { passive: true }
        );
        if (window.matchMedia("(max-width:767px)").matches) dotsBox.hidden = true;

        addEventListener("resize", () => center(current));

        toggleUI(0);
        center(0);
        })();</script>
    </body>
</html>
